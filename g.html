<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMER STUDIO | THE CREATOR DISTRICT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #0B0E11;
            --gold: #F3BA2F;
            --gamer-red: #ff0033;
            --card-bg: #1E2329;
            --border: rgba(243, 186, 47, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* Navigation */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); }
        .nav-btn { text-decoration: none; color: #fff; font-family: 'Cinzel'; font-size: 10px; letter-spacing: 1px; border: 1px solid var(--border); padding: 8px 15px; transition: 0.3s; cursor: pointer; background: transparent; }
        .nav-btn:hover { border-color: var(--gamer-red); color: var(--gamer-red); }

        /* Hero Section */
        .hero { text-align: center; padding: 40px 20px; }
        .studio-title { font-family: 'Cinzel'; font-size: clamp(24px, 5vw, 45px); color: var(--gamer-red); letter-spacing: 8px; text-shadow: 0 0 20px rgba(255, 0, 51, 0.3); }
        .tagline { font-size: 10px; letter-spacing: 4px; color: #848E9C; margin-top: 10px; }

        /* Grid Container - ২০টি প্লট প্রতি লাইনে */
        .map-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; overflow-x: auto; }
        .plot-grid { 
            display: grid; 
            grid-template-columns: repeat(20, 1fr); /* প্রতি লাইনে ২০টি */
            gap: 4px; 
            background: #000; 
            padding: 10px;
            border: 1px solid var(--border);
            width: fit-content;
            margin: 0 auto;
        }

        /* প্লট সাইজ অর্ধেক করা হয়েছে */
        .plot { 
            width: 45px; 
            height: 45px; 
            background: #161A1E; 
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
        }
        .plot:hover { border-color: var(--gamer-red); z-index: 10; transform: scale(1.2); box-shadow: 0 0 15px rgba(255,0,51,0.4); }
        
        .plot img { width: 100%; height: 100%; object-fit: cover; }
        .plot-id { font-size: 8px; color: #333; font-family: 'Cinzel'; }

        /* Tooltip */
        #tooltip { position: fixed; background: var(--gamer-red); color: #fff; padding: 5px 10px; font-size: 10px; pointer-events: none; display: none; z-index: 5000; font-family: 'Cinzel'; border-radius: 2px; }

        /* Footer Info */
        .info-bar { margin-top: 40px; padding: 20px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: #848E9C; }
        .info-bar b { color: var(--gold); }

        .wa-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: #fff; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="nav-btn">← BACK TO HOME</a>
        <div style="display:flex; gap:10px;">
            <button class="nav-btn" onclick="downloadMap()">SNAPSHOT</button>
            <a href="order.html" class="nav-btn" style="background:var(--gamer-red); border:none; color:#fff;">BUY PLOT ($29)</a>
        </div>
    </div>

    <div class="hero">
        <h1 class="studio-title">GAMER STUDIO</h1>
        <p class="tagline">LIMITED TO 10,000 ELITE CREATORS WORLDWIDE</p>
    </div>

    <div class="map-wrapper" id="capture-area">
        <div class="plot-grid" id="mainGrid">
            </div>
    </div>

    <div class="info-bar">
        🌍 <b>STRATEGIC LOCATION:</b> Reserved for Streamers, YouTubers, and Gaming Brands. <br>
        Price: <b>$29 / Plot</b> | Update Fee: <b>$9</b> | Status: <b>Permanent Legacy</b>
    </div>

    <div id="tooltip">PLOT #1</div>

    <a href="https://wa.me/8801576940717" class="wa-float"><i class="fab fa-whatsapp"></i> LIVE SUPPORT</a>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            authDomain: "the-5k-elite-legacy.firebaseapp.com",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
            projectId: "the-5k-elite-legacy",
            storageBucket: "the-5k-elite-legacy.firebasestorage.app",
            messagingSenderId: "440824313752",
            appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const grid = document.getElementById('mainGrid');
        const tooltip = document.getElementById('tooltip');

        // গ্রিড তৈরি এবং ডাটা লোড
        function initGrid() {
            db.ref('gamer_studio/live').on('value', snapshot => {
                const data = snapshot.val() || {};
                grid.innerHTML = "";
                
                // আপনার জন্য ১০,০০০ প্লটের স্ট্রাকচার কিন্তু লোডিং স্পিডের জন্য প্রথম ১০০০টি রেন্ডার করা (ভবিষ্যতে বাড়বে)
                for (let i = 1; i <= 200; i++) { 
                    const plot = document.createElement('div');
                    plot.className = 'plot';
                    
                    if (data[i]) {
                        plot.innerHTML = `<img src="${data[i].imageUrl}" alt="logo">`;
                        plot.onclick = () => window.open(data[i].link, '_blank');
                    } else {
                        plot.innerHTML = `<span class="plot-id">${i}</span>`;
                    }

                    // Tooltip Logic
                    plot.onmouseenter = (e) => {
                        tooltip.style.display = 'block';
                        tooltip.innerText = `PLOT #${i} ${data[i] ? '- ' + data[i].name : '(VACANT)'}`;
                    };
                    plot.onmousemove = (e) => {
                        tooltip.style.left = e.clientX + 15 + 'px';
                        tooltip.style.top = e.clientY + 15 + 'px';
                    };
                    plot.onmouseleave = () => tooltip.style.display = 'none';

                    grid.appendChild(plot);
                }
            });
        }

        function downloadMap() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { backgroundColor: '#0B0E11', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Gamer-Studio-Map.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        window.onload = initGrid;
    </script>
</body>
</html>
