<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMER STUDIO | THE CREATOR DISTRICT</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { 
            --b-yellow: #FCD535; 
            --b-dark: #1E2329; 
            --b-bg: #0B0E11; 
            --gamer-red: #ff0033;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--b-bg); color: #EAECEF; font-family: 'Plus Jakarta Sans', sans-serif; text-align: center; overflow-x: hidden; }

        /* Navbar */
        .top-nav { display: flex; justify-content: space-between; padding: 15px 5%; background: var(--b-dark); border-bottom: 1px solid #333; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .back-btn { color: #fff; text-decoration: none; font-size: 12px; font-weight: bold; font-family: 'Cinzel'; }
        .pill { padding: 8px 15px; border: 1px solid var(--b-yellow); color: var(--b-yellow); border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }

        /* Hero Section */
        .hero { padding: 60px 20px; background: linear-gradient(to bottom, #161a1e, #0b0e11); }
        .shimmer-title { font-family: 'Cinzel'; font-size: clamp(30px, 8vw, 55px); color: var(--gamer-red); margin: 0; text-shadow: 0 0 20px rgba(255, 0, 51, 0.4); letter-spacing: 5px; }
        .tagline { color: #848e9c; font-size: 11px; letter-spacing: 3px; margin-top: 15px; text-transform: uppercase; }
        
        .stats-row { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .stat-box { background: var(--b-dark); padding: 12px 25px; border-radius: 5px; border: 1px solid #333; font-weight: bold; font-size: 13px; font-family: 'Cinzel'; }

        /* Map Grid */
        .map-container { 
            width: 95%; max-width: 1100px; margin: 20px auto; 
            border: 2px solid #333; border-radius: 10px; background: #000; 
            overflow: auto; padding: 20px; min-height: 450px;
        }
        .plot-grid { 
            display: grid; grid-template-columns: repeat(20, 1fr); 
            gap: 4px; width: fit-content; margin: 0 auto; 
        }
        .plot { 
            width: 45px; height: 45px; background: #161A1E; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; 
            align-items: center; justify-content: center; cursor: pointer; 
            position: relative; transition: 0.2s;
        }
        .plot:hover { border-color: var(--gamer-red); transform: scale(1.1); z-index: 5; background: #23282e; }
        .plot img { width: 100%; height: 100%; object-fit: cover; }
        .plot-id { font-size: 9px; color: #444; font-family: 'Cinzel'; }

        /* Integrated Modal */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 9999; 
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); 
        }
        .modal-box { 
            background: #1E2329; border: 2px solid var(--gamer-red); 
            padding: 40px; width: 90%; max-width: 400px; border-radius: 15px; text-align: center; 
        }
        .modal-box h2 { font-family: 'Cinzel'; color: var(--gamer-red); margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: #2B3139; border: 1px solid #444; 
            color: #fff; border-radius: 8px; outline: none; font-size: 15px;
        }
        .btn-submit { 
            width: 100%; padding: 16px; background: var(--gamer-red); 
            color: #fff; font-weight: bold; border: none; cursor: pointer; 
            border-radius: 8px; font-size: 16px; margin-top: 15px; font-family: 'Cinzel';
        }

        /* Tooltip */
        #tooltip { position: fixed; display: none; background: #000; color: var(--gamer-red); padding: 5px 10px; border: 1px solid var(--gamer-red); font-size: 11px; z-index: 10000; pointer-events: none; border-radius: 3px; }
        
        .wa-btn { display: block; background: #2ebd85; color: #fff; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn">← GATEWAY</a>
        <div class="pill" onclick="navigator.clipboard.writeText('912221034'); alert('Binance ID Copied!')">BINANCE ID: 912221034</div>
    </div>

    <div class="hero">
        <h1 class="shimmer-title">GAMER STUDIO</h1>
        <p class="tagline">Exclusive District for Creators & Content Kings</p>
        
        <div class="stats-row">
            <div class="stat-box">CREATOR ZONE</div>
            <div class="stat-box" style="color:var(--gamer-red)">$29 / PLOT</div>
        </div>
    </div>

    <div class="map-container">
        <div class="plot-grid" id="mainGrid"></div>
    </div>

    <div id="booking-modal" class="modal-overlay">
        <div class="modal-box" id="form-ui">
            <h2>RESERVE PLOT</h2>
            <input type="text" id="brand-name" placeholder="Enter Your Studio/Brand Name">
            <input type="number" id="plot-number" placeholder="Plot Number" readonly>
            <button class="btn-submit" onclick="submitOrder()">SUBMIT REQUEST</button>
            <p onclick="closeModal()" style="margin-top:20px; color:#555; cursor:pointer; font-size:12px;">CANCEL</p>
        </div>

        <div class="modal-box" id="success-ui" style="display:none;">
            <h2 style="color:#2ebd85;">RECORDED!</h2>
            <p id="success-msg" style="font-size:13px; color:#ccc; margin:15px 0;"></p>
            <a href="#" id="wa-link" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> CONTACT FOR ACTIVATION</a>
            <p onclick="location.reload()" style="margin-top:20px; color:#555; cursor:pointer; font-size:12px;">BACK TO MAP</p>
        </div>
    </div>

    <div id="tooltip"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Grid
        function initGrid() {
            const grid = document.getElementById('mainGrid');
            const tooltip = document.getElementById('tooltip');
            
            db.ref('gamer_studio_live').on('value', snap => {
                const data = snap.val() || {};
                grid.innerHTML = "";
                for (let i = 1; i <= 200; i++) {
                    const p = document.createElement('div');
                    p.className = 'plot';
                    
                    if (data[i]) {
                        p.innerHTML = `<img src="${data[i].logo}">`;
                        p.onclick = () => window.open(data[i].url, '_blank');
                    } else {
                        p.innerHTML = `<span class="plot-id">${i}</span>`;
                        p.onclick = () => openModal(i);
                    }

                    p.onmouseenter = () => { tooltip.style.display='block'; tooltip.innerText = data[i] ? data[i].name : `VACANT #${i}`; };
                    p.onmousemove = (e) => { tooltip.style.left = e.clientX + 15 + 'px'; tooltip.style.top = e.clientY + 15 + 'px'; };
                    p.onmouseleave = () => tooltip.style.display='none';
                    grid.appendChild(p);
                }
            });
        }

        function openModal(n) {
            document.getElementById('plot-number').value = n;
            document.getElementById('booking-modal').style.display='flex';
        }
        function closeModal() { document.getElementById('booking-modal').style.display='none'; }

        function submitOrder() {
            const name = document.getElementById('brand-name').value;
            const plotNum = document.getElementById('plot-number').value;
            if(!name) return alert("Please enter brand name");

            db.ref('gamer_studio_inquiries/' + plotNum).set({
                brand: name, plot: plotNum, status: "Pending", time: Date.now()
            }).then(() => {
                confetti();
                document.getElementById('form-ui').style.display='none';
                document.getElementById('success-ui').style.display='block';
                document.getElementById('success-msg').innerText = `Request for Plot #${plotNum} sent!`;
                
                const waMsg = encodeURIComponent(`Hi Support, I want to activate Gamer Studio Plot #${plotNum}.\nBrand: ${name}`);
                document.getElementById('wa-link').href = `https://wa.me/8801576940717?text=${waMsg}`;
            });
        }

        window.onload = initGrid;
    </script>
</body>
</html>
