<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL ARK | UN Reforestation Vision 2030</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;600;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2ebd85;
            --primary-glow: rgba(46, 189, 133, 0.4);
            --accent: #FCD535;
            --bg-deep: #050708;
            --bg-card: #0D1117;
            --text-silver: #E6EDF3;
            --text-dim: #8B949E;
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-silver); line-height: 1.8; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 7, 8, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 5000; border-bottom: 1px solid var(--border-glow);
        }
        .logo-main { height: 50px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        
        /* --- HERO & DASHBOARD --- */
        .hero-megalith {
            min-height: 80vh; padding: 100px 8% 50px; text-align: center;
            background: radial-gradient(circle at top, #161b22 0%, #050708 70%);
        }
        .hero-megalith h1 { font-family: 'Cinzel', serif; font-size: clamp(40px, 8vw, 90px); line-height: 1; margin-bottom: 30px; }
        .hero-megalith h1 span { background: linear-gradient(180deg, var(--primary) 0%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; margin-top: 50px; }
        .data-card { background: var(--bg-card); padding: 30px; border-radius: 15px; border: 1px solid var(--border-glow); text-align: center; transition: 0.3s; }
        .data-card h3 { font-size: 2.5rem; color: var(--accent); font-family: 'Space Grotesk'; }
        .data-card p { text-transform: uppercase; color: var(--text-dim); font-size: 11px; letter-spacing: 2px; font-weight: 800; }

        /* --- NEWS TICKER (DONORS) --- */
        .news-headline-bar { background: #000; padding: 20px 0; border-top: 1px solid #333; overflow: hidden; position: relative; margin-top: 40px; }
        .news-headline-bar::before { content: "LIVE GUARDIANS"; position: absolute; left: 0; top: 0; background: var(--primary); color: #000; font-size: 10px; font-weight: 900; padding: 4px 12px; z-index: 10; }
        .ticker-wrap { display: flex; width: max-content; animation: ticker-scroll 40s linear infinite; }
        @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .ticker-box { display: flex; align-items: center; gap: 15px; margin-right: 40px; background: #0D1117; padding: 10px 20px; border-radius: 50px; border: 1px solid #222; }
        .ticker-box img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }

        /* --- MISSION SCROLLER (IMPACT) --- */
        .mission-scroller-section { padding: 80px 0; background: #000; overflow: hidden; }
        .plot-track { display: flex; width: max-content; animation: ticker-scroll 60s linear infinite; }
        .plot-canvas { min-width: 350px; height: 450px; margin-right: 25px; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid #333; }
        .plot-canvas img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .plot-label { position: absolute; bottom: 0; width: 100%; padding: 30px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- BUTTONS & MODAL --- */
        .btn-ark {
            padding: 20px 50px; background: var(--primary); color: #000; font-size: 1.2rem; font-weight: 900;
            border-radius: 50px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
            box-shadow: 0 0 30px var(--primary-glow); transition: 0.3s;
        }
        .btn-ark:hover { transform: scale(1.05); background: #fff; }

        .ark-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-body { width: 90%; max-width: 500px; padding: 50px; background: var(--bg-card); border-radius: 30px; text-align: center; border: 1px solid var(--border-glow); }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 20px; text-align: center; }

        /* --- SUPPORT & FOOTER --- */
        .support-system { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 9999; }
        .support-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: #fff; text-decoration: none; transition: 0.3s; }
        .wa-live { background: #25D366; }
        .tw-live { background: #000; border: 1px solid #333; }
        
        footer { padding: 80px 8% 40px; background: #000; text-align: center; border-top: 1px solid #111; }
        .footer-logo { height: 60px; opacity: 0.3; margin-bottom: 30px; }
    </style>
</head>
<body>

        <div class="logo-wrap">
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj48ZGVmcz48bGluZWFyR3JhZGllbnQgaWQ9ImEiIHgxPSIwJSIgeTE9IjAlIiB4Mj0iMTAwJSIgeTI9IjEwMCUiPjxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiMyZWJkODUiLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMxZThhNjEiLz48L2xpbmVhckdyYWRpZW50PjwvZGVmcz48Y2lyY2xlIGN4PSIyNTYiIGN5PSIyNTYiIHI9IjI0MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJ1cmwoI2EpIiBzdHJva2Utd2lkdGg9IjE2Ii8+PHBhdGggZmlsbD0idXJsKCNhKSIgZD0iTTI1NiA4MGwtMTYwIDMyMGgxMTJsNDgtOTYgNDggOTZoMTEyeiIvPjxwYXRoIGZpbGw9IiNmZmYiIGQ9Ik0yNTYgMTYwbC04MCAxNjBoMTYweiIvPjwvc3ZnPg==" class="logo-main" alt="ARK">
        </div>
        <div class="social-top">
            <a href="https://x.com/kawsar6700" target="_blank" style="color:#fff; font-size:24px;"><i class="fab fa-x-twitter"></i></a>
        </div>
    </nav>

    <section class="hero-megalith">
        <div class="hero-tag">A Decentralized Planet Recovery System</div>
        <h1>THE ETERNAL <br><span>ARK PROJECT</span></h1>
        
        <div class="dashboard-grid">
            <div class="data-card"><h3 id="liveCount">0</h3><p>Trees Planted</p></div>
            <div class="data-card"><h3>1B</h3><p>Global Target</p></div>
            <div class="data-card"><h3>95%</h3><p>Survival Rate</p></div>
            <div class="data-card"><h3>$1.00</h3><p>Unit Cost</p></div>

    </section>

    <section class="news-headline-bar">
        <div class="ticker-wrap" id="donorTicker">
            </div>
    </section>

    <section class="mission-scroller-section">
        <h2 style="text-align:center; font-family:'Cinzel'; margin-bottom:50px; font-size:2.5rem;">MISSION UPDATES</h2>
        <div class="plot-track" id="missionTicker">
            </div>
    </section>

    <section class="mega-cta" style="padding: 100px 8%; text-align: center;">
        <h2 style="font-family:'Cinzel'; font-size: 3rem; margin-bottom:40px;">PLANT THE LEGACY</h2>
        <button class="btn-ark" onclick="openArk()">Start Planting</button>
        
        <div style="margin-top:60px; display:flex; justify-content:center; gap:30px; flex-wrap: wrap;">
            <img src="https://www.payoneer.com/wp-content/themes/payoneer/assets/images/logo.svg" height="40" alt="Payoneer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" height="30" alt="Visa">

        <a href="https://x.com/kawsar6700" target="_blank" class="support-circle tw-live"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div class="ark-modal" id="arkModal">
        <div class="modal-body">
            <h2 style="color:var(--primary); margin-bottom:20px;">INITIATE MISSION</h2>
            <input type="text" placeholder="Guardian Name">

        <p>© 2026 THE ETERNAL ARK. ALL RIGHTS RESERVED.</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openArk() { document.getElementById('arkModal').style.display='flex'; }
        function closeArk() { document.getElementById('arkModal').style.display='none'; }

        // LIVE DONOR & AUTOMATIC COUNTING
        db.ref('donors').on('value', snap => {
            const ticker = document.getElementById('donorTicker');
            const liveCount = document.getElementById('liveCount');
            if(snap.exists()){
                let html = "";
                let totalTrees = 0;
                Object.values(snap.val()).forEach(d => {
                    totalTrees += parseInt(d.trees || 0);
                    html += `
                        <div class="ticker-box">
                            <img src="${d.image || 'https://via.placeholder.com/100'}">
                            <b>${d.name}</b>
                            <span style="color:var(--primary); font-weight:900;">+${d.trees}</span>
                        </div>`;
                });
                // Duplicate for infinite scrolling effect
                ticker.innerHTML = html + html + html; 
                liveCount.innerText = totalTrees.toLocaleString();
            }
        });

        // AUTOMATIC MISSION UPDATES (New slot created for every new image)
        db.ref('missionUpdates').on('value', snap => {
            const mTicker = document.getElementById('missionTicker');
            if(snap.exists()){
                let mHtml = "";
                Object.values(snap.val()).forEach(m => {
                    mHtml += `
                        <div class="plot-canvas">
                            <img src="${m.url}">
                            <div class="plot-label">
                                <span style="color:var(--primary); font-size:10px; letter-spacing:3px;">LIVE IMPACT</span>
                                <h4 style="font-family:'Cinzel';">SITE RECOVERY COMPLETED</h4>
                            </div>
                        </div>`;
                });
                mTicker.innerHTML = mHtml + mHtml;
            }
        });
    </script>
</body>
</html>
