<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ETERNAL ARK | UN Reforestation Vision 2030</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;600;700;800;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #2ebd85;
            --primary-glow: rgba(46, 189, 133, 0.4);
            --accent: #FCD535;
            --bg-deep: #050708;
            --bg-card: #0D1117;
            --text-silver: #E6EDF3;
            --text-dim: #8B949E;
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-silver); line-height: 1.8; overflow-x: hidden; }

        /* --- NAVIGATION --- */
        nav {
            padding: 25px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 7, 8, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 5000; border-bottom: 1px solid var(--border-glow);
        }
        .logo-main { height: 55px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        
        /* --- HERO & DASHBOARD --- */
        .hero-megalith {
            min-height: 100vh; padding: 150px 8% 100px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .hero-megalith h1 { font-family: 'Cinzel', serif; font-size: clamp(45px, 10vw, 110px); line-height: 0.9; margin-bottom: 40px; }
        .hero-megalith h1 span { background: linear-gradient(180deg, var(--primary) 0%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 30px; width: 100%; margin-top: 60px; }
        .data-card { background: var(--bg-card); padding: 40px; border-radius: 20px; border: 1px solid var(--border-glow); text-align: left; }
        .data-card h3 { font-size: 3rem; color: var(--accent); font-family: 'Space Grotesk'; margin-bottom: 5px; }
        .data-card p { text-transform: uppercase; color: var(--text-dim); font-size: 12px; letter-spacing: 3px; font-weight: 800; }

        /* --- NEWS TICKER (DONORS) --- */
        .news-headline-bar { background: #000; padding: 25px 0; border-top: 1px solid #333; overflow: hidden; position: relative; }
        .news-headline-bar::before { content: "LIVE GUARDIANS"; position: absolute; left: 0; top: 0; background: var(--primary); color: #000; font-size: 10px; font-weight: 900; padding: 5px 15px; z-index: 10; }
        .ticker-wrap { display: flex; width: max-content; animation: ticker-scroll 50s linear infinite; }
        @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        .ticker-box { display: flex; align-items: center; gap: 20px; margin-right: 60px; background: #0D1117; padding: 15px 30px; border-radius: 15px; border: 1px solid #222; }
        .ticker-box img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background: #222; }

        /* --- MISSION SCROLLER (PHOTO UPDATES) --- */
        .mission-scroller-section { padding: 100px 0; background: #000; overflow: hidden; }
        .plot-track { display: flex; width: max-content; animation: ticker-scroll 80s linear infinite; }
        .plot-canvas { min-width: 450px; height: 550px; margin-right: 35px; border-radius: 30px; overflow: hidden; position: relative; border: 1px solid #333; background: #111; }
        .plot-canvas img { width: 100%; height: 100%; object-fit: cover; }
        .plot-label { position: absolute; inset: 0; padding: 50px; display: flex; flex-direction: column; justify-content: flex-end; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* --- PAYMENT LOGOS --- */
        .pay-logos { margin-top: 60px; display: flex; justify-content: center; align-items: center; gap: 50px; }
        .pay-logos img { height: 40px; filter: brightness(1); opacity: 1; }

        /* --- CTA & SUPPORT --- */
        .btn-ark {
            padding: 30px 80px; background: var(--primary); color: #000; font-size: 1.5rem; font-weight: 900;
            border-radius: 100px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 5px;
            box-shadow: 0 0 50px var(--primary-glow); transition: 0.5s;
        }
        .support-system { position: fixed; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 20px; z-index: 10000; }
        .support-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #fff; text-decoration: none; }
        .wa-live { background: #25D366; }
        .tw-live { background: #000; border: 1px solid #333; }

        .ark-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); backdrop-filter: blur(30px); z-index: 20000; justify-content: center; align-items: center; }
        .modal-body { width: 600px; padding: 80px; background: var(--bg-card); border-radius: 40px; text-align: center; }
        input { width: 100%; padding: 25px; background: #000; border: 1px solid #333; color: #fff; border-radius: 15px; margin-bottom: 30px; font-size: 20px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-wrap">
            <img src="https://i.ibb.co/m5YvX9C/logo.png" id="siteLogo" class="logo-main" alt="ARK">
            <div class="live-pulse"><div class="pulse-dot"></div> MISSION LIVE</div>
        </div>
        <div class="social-top">
            <a href="https://x.com/kawsar6700" target="_blank" style="color:#fff; font-size:24px;"><i class="fab fa-x-twitter"></i></a>
        </div>
    </nav>

    <section class="hero-megalith">
        <div class="hero-tag">A Decentralized Planet Recovery System</div>
        <h1>THE ETERNAL <br><span>ARK PROJECT</span></h1>
        
        <div class="dashboard-grid">
            <div class="data-card"><h3 id="liveTreeCount">1,240,482</h3><p>Trees Planted</p></div>
            <div class="data-card"><h3>1B</h3><p>Global Target</p></div>
            <div class="data-card"><h3>95%</h3><p>Survival Rate</p></div>
            <div class="data-card"><h3>$1.00</h3><p>Unit Cost</p></div>
        </div>
    </section>

    <section class="news-headline-bar">
        <div class="ticker-wrap" id="donorTicker">
            </div>
    </section>

    <section class="mission-scroller-section">
        <h2 style="text-align:center; font-family:'Cinzel'; margin-bottom:60px; font-size:3rem;">IMPACT GALLERY</h2>
        <div class="plot-track" id="missionTicker">
            </div>
    </section>

    <section style="padding: 100px 8%; text-align: center;">
        <button class="btn-ark" onclick="openArk()">Start Planting</button>
        
        <div class="pay-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Payoneer_logo.svg" alt="Payoneer">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        </div>
    </section>

    <div class="support-system">
        <a href="https://wa.me/8801756206213" target="_blank" class="support-circle wa-live"><i class="fab fa-whatsapp"></i></a>
        <a href="https://x.com/kawsar6700" target="_blank" class="support-circle tw-live"><i class="fab fa-x-twitter"></i></a>
    </div>

    <div class="ark-modal" id="arkModal">
        <div class="modal-body">
            <h2 style="color:var(--primary); font-family:'Cinzel';">SECURE THE ARK</h2>
            <input type="text" placeholder="Guardian Name">
            <input type="number" placeholder="Number of Trees">
            <button class="btn-ark" style="width:100%;" onclick="alert('Connecting to Payoneer...')">Initialize Mission</button>
            <p onclick="closeArk()" style="margin-top:30px; cursor:pointer; color:#444;">ABORT</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
            databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openArk() { document.getElementById('arkModal').style.display='flex'; }
        function closeArk() { document.getElementById('arkModal').style.display='none'; }

        // ১. অরিজিনাল কাউন্টিং সিস্টেম এবং ডোনারদের তথ্য (নিউজ হেডলাইন স্টাইল)
        db.ref('donors').on('value', snap => {
            const ticker = document.getElementById('donorTicker');
            const countDisplay = document.getElementById('liveTreeCount');
            if(snap.exists()){
                let html = "";
                let totalTrees = 1240482; // বেস কাউন্ট
                
                // শুরুতে ১টি ফাঁকা গোলাকার জায়গা
                html += `<div class="ticker-box"><img src="" alt="Pending"><b>Waiting...</b><div class="val">0</div></div>`;

                Object.values(snap.val()).forEach(d => {
                    let trees = parseInt(d.trees) || 0;
                    totalTrees += trees;
                    html += `
                        <div class="ticker-box">
                            <img src="${d.image || 'https://via.placeholder.com/100'}" alt="Guardian">
                            <b>${d.name}</b>
                            <div class="val">${trees} TREES</div>
                        </div>`;
                });
                
                // নতুন তথ্য যোগ হলে অটোমেটিক আরেকটি ফাঁকা জায়গা তৈরি হবে (আপনার রিকোয়েস্ট অনুযায়ী)
                html += `<div class="ticker-box"><img src="" alt="Next"><b>New Guardian</b><div class="val">...</div></div>`;
                
                ticker.innerHTML = html + html; // লুপের জন্য ডাবল করা
                countDisplay.innerText = totalTrees.toLocaleString();
            }
        });

        // ২. ইমেজ আপডেট সিস্টেম (৪টি করে সেকশন তৈরি হবে)
        db.ref('missionUpdates').on('value', snap => {
            const mTicker = document.getElementById('missionTicker');
            let mHtml = "";
            
            // শুরুতে ৪টি ফাঁকা জায়গা (Placeholder)
            for(let i=0; i<4; i++) {
                mHtml += `<div class="plot-canvas"><div class="plot-label"><span>PENDING AREA</span><h4>Waiting for Upload...</h4></div></div>`;
            }

            if(snap.exists()){
                const updates = Object.values(snap.val());
                updates.forEach(m => {
                    mHtml += `
                        <div class="plot-canvas">
                            <img src="${m.url}">
                            <div class="plot-label"><span>LIVE UPDATE</span><h4>Verified Progress</h4></div>
                        </div>`;
                });
                
                // যদি ৪টি পূরণ হয়ে যায়, তবে আরও ৪টি ফাঁকা জায়গা তৈরি হবে
                if(updates.length % 4 === 0) {
                    for(let i=0; i<4; i++) {
                        mHtml += `<div class="plot-canvas"><div class="plot-label"><span>NEXT SECTOR</span><h4>Future Impact Zone</h4></div></div>`;
                    }
                }
            }
            mTicker.innerHTML = mHtml + mHtml;
        });
    </script>
</body>
</html>
